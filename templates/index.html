<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E S T É T I C A</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/tufte.min.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/font-awesome.min.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    </head>

    <body>
        <!-- Dark Mode Toggle -->
        <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Alternar modo noche">
            <span class="fa-stack fa-lg">
                <i class="fa fa-square-o fa-stack-2x"></i>
                <i id="mode-icon" class="fa fa-moon-o fa-stack-1x"></i>
            </span>
        </button>
        <h1>Estética @ online / José M. González</h1>
            <section>
                <span class="marginnote">
                    <a href="https://github.com/jmgonzalezro" class="fa-stack fa-lg" rel="me">
                        <i class="fa fa-square-o fa-stack-2x"></i>
                        <i class="fa fa-github fa-stack-1x"></i>
                    </a>
                    <a href="https://linkedin.com/in/jmgonzalezro" class="fa-stack fa-lg" rel="me">
                        <i class="fa fa-square-o fa-stack-2x"></i>
                        <i class="fa fa-linkedin fa-stack-1x"></i>
                    </a>
                    <a href="/cv-terminal" class="fa-stack fa-lg" rel="me" title="Terminal CV">
                        <i class="fa fa-square-o fa-stack-2x"></i>
                        <i class="fa fa-terminal fa-stack-1x"></i>
                    </a>
                </span>

                <h2>Estética, dialéctica, software y algoritmos.</h2>
                <h2>Timeline</h2>
                <ul> 
                    {% for post in posts %} 
                    <li><a href="/posts/{{ post.url }}">{{ post.title }}</a></li>
                    {% endfor %}
                </ul>
            </section>
        </article>
        
        <script>
            // Dark Mode Toggle Functionality
            function toggleDarkMode() {
                const body = document.body;
                const modeIcon = document.getElementById('mode-icon');
                
                if (body.getAttribute('data-theme') === 'dark') {
                    body.removeAttribute('data-theme');
                    modeIcon.className = 'fa fa-moon-o fa-stack-1x';
                    localStorage.setItem('theme', 'light');
                } else {
                    body.setAttribute('data-theme', 'dark');
                    modeIcon.className = 'fa fa-sun-o fa-stack-1x';
                    localStorage.setItem('theme', 'dark');
                }
            }

            // Initialize theme on page load
            function initializeTheme() {
                const savedTheme = localStorage.getItem('theme');
                const modeIcon = document.getElementById('mode-icon');
                
                if (savedTheme === 'dark' || (savedTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.body.setAttribute('data-theme', 'dark');
                    modeIcon.className = 'fa fa-sun-o fa-stack-1x';
                } else {
                    modeIcon.className = 'fa fa-moon-o fa-stack-1x';
                }
            }

            // Run on page load
            initializeTheme();
        </script>
    </body>
</html>
